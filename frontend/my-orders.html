<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders | BiteRight</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="perfect-alignment.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍴</text></svg>">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      padding-bottom: 70px; /* Space for bottom nav */
      font-family: 'Poppins', sans-serif;
      color: #2c3e50;
      line-height: 1.6;
    }
    
    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 1.5rem;
      text-align: center;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
      background-size: 400% 100%;
      animation: gradientShift 3s ease infinite;
    }
    
    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    
    .order-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 1.5rem;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }
    
    .order-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }
    
    .order-header {
      padding: 1.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .order-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0;
    }
    
    .order-status {
      background: rgba(255, 255, 255, 0.2);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .order-status.delivered {
      background: rgba(46, 204, 113, 0.2);
      color: #2ecc71;
    }
    
    .order-status.processing {
      background: rgba(241, 196, 15, 0.2);
      color: #f1c40f;
    }
    
    .order-status.cancelled {
      background: rgba(231, 76, 60, 0.2);
      color: #e74c3c;
    }
    
    .order-body {
      padding: 1.5rem;
    }
    
    .order-details {
      margin-bottom: 1.5rem;
    }
    
    .detail-row {
      display: flex;
      margin-bottom: 0.8rem;
    }
    
    .detail-label {
      font-weight: 600;
      width: 140px;
      color: #7f8c8d;
    }
    
    .detail-value {
      flex: 1;
    }
    
    .order-items {
      background: rgba(102, 126, 234, 0.05);
      border-radius: 15px;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
    }
    
    .order-item {
      display: flex;
      justify-content: space-between;
      padding: 0.8rem 0;
      border-bottom: 1px dashed rgba(0, 0, 0, 0.1);
    }
    
    .order-item:last-child {
      border-bottom: none;
    }
    
    .item-name {
      font-weight: 500;
    }
    
    .item-price {
      font-weight: 600;
    }
    
    .order-total {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 1.1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(0, 0, 0, 0.1);
    }
    
    .order-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .action-btn {
      flex: 1;
      padding: 1rem;
      border: none;
      border-radius: 15px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .track-btn {
      background: rgba(102, 126, 234, 0.1);
      color: #667eea;
    }
    
    .track-btn:hover {
      background: rgba(102, 126, 234, 0.2);
    }
    
    .reorder-btn {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
      box-shadow: 0 4px 15px rgba(240, 147, 251, 0.3);
    }
    
    .reorder-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(240, 147, 251, 0.4);
    }
    
    .empty-orders {
      text-align: center;
      padding: 3rem 1.5rem;
    }
    
    .empty-orders-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      color: rgba(102, 126, 234, 0.3);
    }
    
    .empty-orders h3 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 1rem;
    }
    
    .empty-orders p {
      color: #7f8c8d;
      margin-bottom: 1.5rem;
    }
    
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      padding: 0.8rem;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      z-index: 1000;
    }
    
    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 0.8rem 0;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
      z-index: 1000;
    }
    
    .nav-container {
      display: flex;
      justify-content: space-around;
      max-width: 600px;
      margin: 0 auto;
    }
    
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
      transition: all 0.3s ease;
      color: #7f8c8d;
    }
    
    .nav-btn.active {
      color: #667eea;
    }
    
    .nav-icon {
      font-size: 1.5rem;
      margin-bottom: 0.3rem;
    }
    
    .nav-label {
      font-size: 0.8rem;
      font-weight: 500;
    }
    
    .nav-link {
      text-decoration: none;
      color: inherit;
    }
    
    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }
    
    @media (max-width: 768px) {
      .order-header {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .order-status {
        margin-top: 0.5rem;
      }
      
      .detail-row {
        flex-direction: column;
      }
      
      .detail-label {
        width: 100%;
        margin-bottom: 0.3rem;
      }
      
      .order-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="window.location.href='index.html'">←</button>
  
  <div class="header">
    <h1>🍴 My Orders</h1>
    <p>Track and manage your orders</p>
  </div>
  
  <div class="container" id="ordersContainer">
    <!-- Orders will be dynamically added here -->
  </div>
  
  <!-- Empty Orders State -->
  <div class="container hidden" id="emptyOrders">
    <div class="order-card">
      <div class="empty-orders">
        <div class="empty-orders-icon">🍴</div>
        <h3>No orders yet</h3>
        <p>Your order history will appear here once you place an order.</p>
        <button class="action-btn reorder-btn" onclick="window.location.href='index.html'">
          Start Ordering
        </button>
      </div>
    </div>
  </div>
  
  <!-- Footer Navigation -->
  <nav class="bottom-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-link">
        <button class="nav-btn" data-page="home">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Home</span>
        </button>
      </a>
      <button class="nav-btn active" data-page="orders">
        <span class="nav-icon">🍴</span>
        <span class="nav-label">Orders</span>
      </button>
      <a href="cart.html" class="nav-link">
        <button class="nav-btn" data-page="cart">
          <span class="nav-icon">🛒</span>
          <span class="nav-label">Cart</span>
        </button>
      </a>
      <button class="nav-btn" data-page="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </button>
    </div>
  </nav>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      renderOrders();
    });
    
    function renderOrders() {
      // Retrieve orders from localStorage
      const orders = JSON.parse(localStorage.getItem('orders')) || [];
      const ordersContainer = document.getElementById('ordersContainer');
      const emptyOrders = document.getElementById('emptyOrders');
      
      if (orders.length === 0) {
        ordersContainer.classList.add('hidden');
        emptyOrders.classList.remove('hidden');
        return;
      }
      
      ordersContainer.classList.remove('hidden');
      emptyOrders.classList.add('hidden');
      
      // Clear existing orders
      ordersContainer.innerHTML = '';
      
      // Add orders in reverse chronological order (newest first)
      orders.slice().reverse().forEach((order, index) => {
        // Parse dish items
        const dishItems = order.dish.split(', ').map(item => {
          const parts = item.split(' x');
          return {
            name: parts[0],
            quantity: parts.length > 1 ? parseInt(parts[1]) : 1
          };
        });
        
        // Create order card
        const orderCard = document.createElement('div');
        orderCard.className = 'order-card';
        
        // Determine status class
        let statusClass = 'processing';
        if (order.status === 'Delivered') {
          statusClass = 'delivered';
        } else if (order.status === 'Cancelled') {
          statusClass = 'cancelled';
        }
        
        // Create order header
        const orderHeader = document.createElement('div');
        orderHeader.className = 'order-header';
        orderHeader.innerHTML = `
          <h2 class="order-title">Order #${order.orderId || `BR${100000 + index}`}</h2>
          <span class="order-status ${statusClass}">${order.status || 'In Progress'}</span>
        `;
        
        // Create order body
        const orderBody = document.createElement('div');
        orderBody.className = 'order-body';
        
        // Order details
        const orderDetails = document.createElement('div');
        orderDetails.className = 'order-details';
        orderDetails.innerHTML = `
          <div class="detail-row">
            <span class="detail-label">Date:</span>
            <span class="detail-value">${order.date || new Date().toLocaleDateString()}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Delivery Address:</span>
            <span class="detail-value">${order.location || 'N/A'}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Special Instructions:</span>
            <span class="detail-value">${order.instructions || 'None'}</span>
          </div>
        `;
        
        // Order items
        const orderItems = document.createElement('div');
        orderItems.className = 'order-items';
        
        // Add each dish item
        let itemsHTML = '';
        dishItems.forEach(item => {
          itemsHTML += `
            <div class="order-item">
              <span class="item-name">${item.name} x${item.quantity}</span>
              <span class="item-price">₹${Math.round(order.price / dishItems.length * item.quantity)}</span>
            </div>
          `;
        });
        
        // Add total
        itemsHTML += `
          <div class="order-total">
            <span>Total</span>
            <span>₹${order.price}</span>
          </div>
        `;
        
        orderItems.innerHTML = itemsHTML;
        
        // Order actions
        const orderActions = document.createElement('div');
        orderActions.className = 'order-actions';
        orderActions.innerHTML = `
          <button class="action-btn track-btn" onclick="trackOrder('${order.orderId || `BR${100000 + index}`}')">
            <span>🔍 Track Order</span>
          </button>
          <button class="action-btn reorder-btn" onclick="reorder('${order.orderId || `BR${100000 + index}`}')">
            <span>🔄 Reorder</span>
          </button>
        `;
        
        // Assemble order card
        orderBody.appendChild(orderDetails);
        orderBody.appendChild(orderItems);
        orderBody.appendChild(orderActions);
        
        orderCard.appendChild(orderHeader);
        orderCard.appendChild(orderBody);
        
        ordersContainer.appendChild(orderCard);
      });
    }
    
    function trackOrder(orderId) {
      alert(`Tracking order ${orderId}. In a real app, this would show the delivery status.`);
    }
    
    function reorder(orderId) {
      const orders = JSON.parse(localStorage.getItem('orders')) || [];
      const order = orders.find(o => o.orderId === orderId || `BR${o.id}` === orderId);
      
      if (order) {
        alert(`Reordering ${order.dish}. In a real app, this would add these items to your cart.`);
        // In a real app, you would add these items to the cart
        window.location.href = 'cart.html';
      }
    }
  </script>
</body>
</html>

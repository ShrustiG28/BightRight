<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | BiteRight</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="perfect-alignment.css">
  <link rel="stylesheet" href="design-system.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      padding-bottom: 70px; /* Space for bottom nav */
      font-family: 'Poppins', sans-serif;
    }
    
    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 1.5rem;
      text-align: center;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
      background-size: 400% 100%;
      animation: gradientShift 3s ease infinite;
    }
    
    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    
    .cart-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 1.5rem;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }
    
    .cart-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }
    
    .cart-header {
      padding: 1.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .cart-header h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0;
    }
    
    .cart-count {
      background: rgba(255, 255, 255, 0.2);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .cart-body {
      padding: 1.5rem;
    }
    
    .cart-items {
      margin-bottom: 1.5rem;
    }
    
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem;
      background: rgba(102, 126, 234, 0.05);
      border-radius: 15px;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .cart-item:hover {
      background: rgba(102, 126, 234, 0.1);
      transform: translateX(5px);
    }
    
    .cart-item-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .cart-item-img {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      object-fit: cover;
    }
    
    .cart-item-details h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 0.3rem 0;
      color: #2c3e50;
    }
    
    .cart-item-details p {
      font-size: 0.9rem;
      color: #7f8c8d;
      margin: 0;
    }
    
    .cart-item-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    
    .quantity-control {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    
    .quantity-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: rgba(102, 126, 234, 0.1);
      color: #667eea;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .quantity-btn:hover {
      background: rgba(102, 126, 234, 0.2);
      transform: scale(1.1);
    }
    
    .quantity-value {
      font-weight: 600;
      color: #2c3e50;
    }
    
    .cart-item-price {
      font-weight: 600;
      color: #2c3e50;
      min-width: 80px;
      text-align: right;
    }
    
    .remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(231, 76, 60, 0.1);
      color: #e74c3c;
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.8rem;
    }
    
    .remove-btn:hover {
      background: rgba(231, 76, 60, 0.2);
      transform: scale(1.1);
    }
    
    .cart-summary {
      background: rgba(240, 147, 251, 0.05);
      border-radius: 15px;
      padding: 1.5rem;
    }
    
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.8rem;
      font-size: 1rem;
      color: #2c3e50;
    }
    
    .summary-row.total {
      font-weight: 700;
      font-size: 1.2rem;
      border-top: 1px dashed rgba(0, 0, 0, 0.1);
      padding-top: 1rem;
      margin-top: 1rem;
    }
    
    .promo-code {
      display: flex;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }
    
    .promo-input {
      flex: 1;
      padding: 0.8rem 1rem;
      border: 2px solid rgba(102, 126, 234, 0.2);
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }
    
    .promo-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .apply-btn {
      padding: 0.8rem 1.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .apply-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }
    
    .cart-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    
    .action-btn {
      flex: 1;
      padding: 1rem;
      border: none;
      border-radius: 15px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .continue-btn {
      background: rgba(102, 126, 234, 0.1);
      color: #667eea;
    }
    
    .continue-btn:hover {
      background: rgba(102, 126, 234, 0.2);
    }
    
    .checkout-btn {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
      box-shadow: 0 4px 15px rgba(240, 147, 251, 0.3);
    }
    
    .checkout-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(240, 147, 251, 0.4);
    }
    
    .empty-cart {
      text-align: center;
      padding: 3rem 1.5rem;
    }
    
    .empty-cart-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      color: rgba(102, 126, 234, 0.3);
    }
    
    .empty-cart h3 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 1rem;
    }
    
    .empty-cart p {
      color: #7f8c8d;
      margin-bottom: 1.5rem;
    }
    
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      padding: 0.8rem;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      z-index: 1000;
    }
    
    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 0.8rem 0;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
      z-index: 1000;
    }
    
    .nav-container {
      display: flex;
      justify-content: space-around;
      max-width: 600px;
      margin: 0 auto;
    }
    
    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
      transition: all 0.3s ease;
      color: #7f8c8d;
    }
    
    .nav-btn.active {
      color: #667eea;
    }
    
    .nav-icon {
      font-size: 1.5rem;
      margin-bottom: 0.3rem;
    }
    
    .nav-label {
      font-size: 0.8rem;
      font-weight: 500;
    }
    
    .nav-link {
      text-decoration: none;
      color: inherit;
    }
    
    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }
    
    @media (max-width: 768px) {
      .cart-item {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .cart-item-left {
        margin-bottom: 1rem;
        width: 100%;
      }
      
      .cart-item-right {
        width: 100%;
        justify-content: space-between;
      }
      
      .cart-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="window.history.back()">←</button>
  
  <div class="header">
    <h1>🛒 Your Cart</h1>
    <p>Review your items and proceed to checkout</p>
  </div>
  
  <div class="container">
    <div class="cart-card" id="cartContent">
      <div class="cart-header">
        <h2>Your Items</h2>
        <span class="cart-count" id="itemCount">3 items</span>
      </div>
      
      <div class="cart-body">
        <div class="cart-items" id="cartItemsList">
          <!-- Cart items will be dynamically added here -->
        </div>
        
        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
          </div>
          <div class="summary-row">
            <span>Delivery Fee</span>
            <span id="deliveryFee">₹40</span>
          </div>
          <div class="summary-row">
            <span>Taxes</span>
            <span id="taxes">₹0</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="total">₹0</span>
          </div>
        </div>
        
        <div class="promo-code">
          <input type="text" class="promo-input" placeholder="Enter promo code">
          <button class="apply-btn">Apply</button>
        </div>
        
        <div class="cart-actions">
          <button class="action-btn continue-btn" onclick="window.location.href='index.html'">
            <span>← Continue Shopping</span>
          </button>
          <button class="action-btn checkout-btn" onclick="proceedToCheckout()">
            <span>Proceed to Checkout →</span>
          </button>
        </div>
      </div>
    </div>
    
    <!-- Empty Cart State -->
    <div class="cart-card hidden" id="emptyCart">
      <div class="empty-cart">
        <div class="empty-cart-icon">🛒</div>
        <h3>Your cart is empty</h3>
        <p>Looks like you haven't added any items to your cart yet.</p>
        <button class="action-btn checkout-btn" onclick="window.location.href='index.html'">
          Start Shopping
        </button>
      </div>
    </div>
    
    <!-- Recommendations -->
    <div class="cart-card">
      <div class="cart-header">
        <h2>You Might Also Like</h2>
      </div>
      <div class="cart-body">
        <div class="cart-items" id="recommendationsList">
          <!-- Recommendations will be dynamically added here -->
        </div>
      </div>
    </div>
  </div>
  
  <!-- Footer Navigation -->
  <nav class="bottom-nav">
    <div class="nav-container">
      <a href="index.html" class="nav-link">
        <button class="nav-btn" data-page="home">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Home</span>
        </button>
      </a>
      <a href="my-orders.html" class="nav-link">
        <button class="nav-btn" data-page="orders">
          <span class="nav-icon">🍴</span>
          <span class="nav-label">Orders</span>
        </button>
      </a>
      <button class="nav-btn active" data-page="cart">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Cart</span>
      </button>
      <button class="nav-btn" data-page="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </button>
    </div>
  </nav>

  <script>
    // Sample cart data - in a real app, this would come from localStorage or a backend
    const cartItems = [
      {
        id: 1,
        name: "Tandoori Chicken",
        description: "Full portion, Medium spicy",
        price: 350,
        quantity: 1,
        image: "https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=80&h=80&fit=crop"
      },
      {
        id: 2,
        name: "Chole Bhature",
        description: "2 Bhature, Extra spicy",
        price: 180,
        quantity: 2,
        image: "https://images.unsplash.com/photo-1626777552726-4a6b54c97e46?w=80&h=80&fit=crop"
      },
      {
        id: 3,
        name: "Masala Dosa",
        description: "Paper dosa with sambar and chutney",
        price: 150,
        quantity: 1,
        image: "https://images.unsplash.com/photo-1589301760014-d929f3979dbc?w=80&h=80&fit=crop"
      }
    ];
    
    // Sample recommendations
    const recommendations = [
      {
        id: 4,
        name: "Paneer Butter Masala",
        description: "Creamy tomato gravy with paneer",
        price: 220,
        image: "https://images.unsplash.com/photo-1631452180519-c014fe946bc7?w=80&h=80&fit=crop"
      },
      {
        id: 5,
        name: "Mushroom Risotto",
        description: "Creamy Italian rice with mushrooms",
        price: 280,
        image: "https://images.unsplash.com/photo-1476124369491-e7addf5db371?w=80&h=80&fit=crop"
      }
    ];
    
    document.addEventListener('DOMContentLoaded', function() {
      initializePage();
    });
    
    function initializePage() {
      renderCart();
      renderRecommendations();
      updateCartSummary();
    }
    
    function renderCart() {
      const cartItemsList = document.getElementById('cartItemsList');
      const itemCount = document.getElementById('itemCount');
      const cartContent = document.getElementById('cartContent');
      const emptyCart = document.getElementById('emptyCart');
      
      if (cartItems.length === 0) {
        cartContent.classList.add('hidden');
        emptyCart.classList.remove('hidden');
        return;
      }
      
      cartContent.classList.remove('hidden');
      emptyCart.classList.add('hidden');
      
      // Update item count
      const totalItems = cartItems.reduce((total, item) => total + item.quantity, 0);
      itemCount.textContent = `${totalItems} item${totalItems !== 1 ? 's' : ''}`;
      
      // Clear existing items
      cartItemsList.innerHTML = '';
      
      // Add cart items
      cartItems.forEach(item => {
        const cartItem = document.createElement('div');
        cartItem.className = 'cart-item';
        cartItem.innerHTML = `
          <div class="cart-item-left">
            <img src="${item.image}" alt="${item.name}" class="cart-item-img">
            <div class="cart-item-details">
              <h3>${item.name}</h3>
              <p>${item.description}</p>
            </div>
          </div>
          <div class="cart-item-right">
            <div class="quantity-control">
              <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
              <span class="quantity-value">${item.quantity}</span>
              <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
            </div>
            <div class="cart-item-price">₹${item.price * item.quantity}</div>
          </div>
          <button class="remove-btn" onclick="removeItem(${item.id})">×</button>
        `;
        cartItemsList.appendChild(cartItem);
      });
    }
    
    function renderRecommendations() {
      const recommendationsList = document.getElementById('recommendationsList');
      
      // Clear existing recommendations
      recommendationsList.innerHTML = '';
      
      // Add recommendations
      recommendations.forEach(item => {
        const recommendationItem = document.createElement('div');
        recommendationItem.className = 'cart-item';
        recommendationItem.innerHTML = `
          <div class="cart-item-left">
            <img src="${item.image}" alt="${item.name}" class="cart-item-img">
            <div class="cart-item-details">
              <h3>${item.name}</h3>
              <p>${item.description}</p>
            </div>
          </div>
          <div class="cart-item-right">
            <div class="cart-item-price">₹${item.price}</div>
            <button class="quantity-btn" style="background: rgba(240, 147, 251, 0.1); color: #f093fb;" onclick="addToCart(${item.id})">+</button>
          </div>
        `;
        recommendationsList.appendChild(recommendationItem);
      });
    }
    
    function updateCartSummary() {
      const subtotal = cartItems.reduce((total, item) => total + (item.price * item.quantity), 0);
      const deliveryFee = subtotal > 0 ? 40 : 0;
      const taxes = Math.round(subtotal * 0.05); // 5% tax
      const total = subtotal + deliveryFee + taxes;
      
      document.getElementById('subtotal').textContent = `₹${subtotal}`;
      document.getElementById('deliveryFee').textContent = `₹${deliveryFee}`;
      document.getElementById('taxes').textContent = `₹${taxes}`;
      document.getElementById('total').textContent = `₹${total}`;
    }
    
    function updateQuantity(itemId, newQuantity) {
      if (newQuantity <= 0) {
        removeItem(itemId);
        return;
      }
      
      const itemIndex = cartItems.findIndex(item => item.id === itemId);
      if (itemIndex !== -1) {
        cartItems[itemIndex].quantity = newQuantity;
        renderCart();
        updateCartSummary();
      }
    }
    
    function removeItem(itemId) {
      const itemIndex = cartItems.findIndex(item => item.id === itemId);
      if (itemIndex !== -1) {
        cartItems.splice(itemIndex, 1);
        renderCart();
        updateCartSummary();
      }
    }
    
    function addToCart(itemId) {
      const recommendation = recommendations.find(item => item.id === itemId);
      if (recommendation) {
        const existingItem = cartItems.find(item => item.id === itemId);
        if (existingItem) {
          existingItem.quantity += 1;
        } else {
          cartItems.push({
            ...recommendation,
            quantity: 1
          });
        }
        renderCart();
        updateCartSummary();
        
        // Show a brief animation or notification
        const notification = document.createElement('div');
        notification.textContent = 'Item added to cart!';
        notification.style.position = 'fixed';
        notification.style.bottom = '80px';
        notification.style.left = '50%';
        notification.style.transform = 'translateX(-50%)';
        notification.style.background = 'rgba(39, 174, 96, 0.9)';
        notification.style.color = 'white';
        notification.style.padding = '0.8rem 1.5rem';
        notification.style.borderRadius = '10px';
        notification.style.zIndex = '1001';
        notification.style.fontWeight = '600';
        document.body.appendChild(notification);
        
        setTimeout(() => {
          notification.style.opacity = '0';
          notification.style.transition = 'opacity 0.5s ease';
          setTimeout(() => {
            document.body.removeChild(notification);
          }, 500);
        }, 2000);
      }
    }
    
    function proceedToCheckout() {
      // Save cart items to localStorage
      localStorage.setItem('cartItems', JSON.stringify(cartItems));
      
      // Redirect to checkout page
      window.location.href = 'place-order.html';
    }
  </script>
</body>
</html>

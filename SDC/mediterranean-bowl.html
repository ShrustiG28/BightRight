<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mediterranean Bowl - Customize Your Order | BiteRight</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }
    
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      padding: 0.8rem;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      z-index: 1000;
    }
    
    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding-top: 2rem;
    }
    
    .dish-header {
      text-align: center;
      margin-bottom: 2rem;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    
    .dish-image {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 15px;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    
    .dish-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    
    .dish-meta {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    
    .meta-badge {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 2rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .section-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .ingredients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }
    
    .ingredient-item {
      display: flex;
      align-items: center;
      padding: 0.8rem;
      background: rgba(39, 174, 96, 0.05);
      border-radius: 15px;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .ingredient-item:hover {
      background: rgba(39, 174, 96, 0.1);
      transform: translateY(-2px);
    }
    
    .ingredient-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 1rem;
      accent-color: #27ae60;
      cursor: pointer;
    }
    
    .ingredient-item label {
      font-weight: 500;
      color: #2c3e50;
      cursor: pointer;
      flex: 1;
    }
    
    .customize-btn {
      width: 100%;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      border: none;
      padding: 1rem 2rem;
      border-radius: 25px;
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2rem;
    }
    
    .customize-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(39, 174, 96, 0.4);
      background: linear-gradient(135deg, #2ecc71, #27ae60);
    }
    
    .price-info {
      text-align: center;
      margin: 1.5rem 0;
      padding: 1rem;
      background: linear-gradient(135deg, rgba(39, 174, 96, 0.1), rgba(46, 204, 113, 0.1));
      border-radius: 15px;
    }
    
    .price-info .price {
      font-size: 1.5rem;
      font-weight: 700;
      color: #27ae60;
    }
    
    .price-info .price-note {
      font-size: 0.9rem;
      color: #7f8c8d;
      margin-top: 0.5rem;
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
        padding-top: 4rem;
      }
      
      .dish-header h1 {
        font-size: 2rem;
      }
      
      .ingredients-grid {
        grid-template-columns: 1fr;
      }
      
      .dish-meta {
        gap: 0.5rem;
      }
      
      .meta-badge {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
      }
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="window.history.back()">←</button>
  
  <div class="container">
    <div class="dish-header">
      <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=600&h=250&fit=crop&crop=center" alt="Mediterranean Bowl" class="dish-image" loading="lazy" />
      <h1>🥗 Mediterranean Bowl</h1>
      <p>Fresh and healthy Mediterranean-inspired bowl with olive oil, fresh vegetables, and authentic flavors</p>
      <div class="dish-meta">
        <span class="meta-badge">🇬🇷 Mediterranean</span>
        <span class="meta-badge">⏱️ Prep Time: 15 min</span>
        <span class="meta-badge">👥 Serves: 1-2</span>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">🥬 Fresh Base</h2>
      <div class="ingredients-grid">
        <div class="ingredient-item">
          <input type="checkbox" id="mixed-greens" checked>
          <label for="mixed-greens">Mixed Greens</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="quinoa" checked>
          <label for="quinoa">Quinoa</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="chickpeas" checked>
          <label for="chickpeas">Chickpeas</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="cucumber" checked>
          <label for="cucumber">Fresh Cucumber</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="cherry-tomatoes" checked>
          <label for="cherry-tomatoes">Cherry Tomatoes</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="red-onion" checked>
          <label for="red-onion">Red Onion</label>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">🫒 Mediterranean Essentials</h2>
      <div class="ingredients-grid">
        <div class="ingredient-item">
          <input type="checkbox" id="olives" checked>
          <label for="olives">Kalamata Olives</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="feta" checked>
          <label for="feta">Feta Cheese</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="olive-oil" checked>
          <label for="olive-oil">Extra Virgin Olive Oil</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="lemon" checked>
          <label for="lemon">Fresh Lemon</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="herbs" checked>
          <label for="herbs">Fresh Herbs (Oregano, Basil)</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="hummus">
          <label for="hummus">Homemade Hummus (+₹30)</label>
        </div>
      </div>
    </div>

    <div class="price-info">
      <div class="price">₹200 - ₹260</div>
      <div class="price-note">Price varies based on add-ons and portion size</div>
    </div>

    <a href="Customize.html">
      <button class="customize-btn">🎯 Proceed to Customization</button>
    </a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      initializePage();
      setupEventListeners();
      animateElements();
    });

    function initializePage() {
      updatePrice();
      document.body.style.opacity = '0';
      setTimeout(() => {
        document.body.style.transition = 'opacity 0.5s ease';
        document.body.style.opacity = '1';
      }, 100);
    }

    function setupEventListeners() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', handleIngredientChange);
      });

      const ingredientItems = document.querySelectorAll('.ingredient-item');
      ingredientItems.forEach(item => {
        item.addEventListener('click', function(e) {
          if (e.target.type !== 'checkbox') {
            const checkbox = item.querySelector('input[type="checkbox"]');
            checkbox.checked = !checkbox.checked;
            handleIngredientChange.call(checkbox);
          }
        });
      });
    }

    function handleIngredientChange() {
      const item = this.closest('.ingredient-item');
      
      if (this.checked) {
        item.style.background = 'rgba(39, 174, 96, 0.15)';
        item.style.borderLeft = '4px solid #27ae60';
      } else {
        item.style.background = 'rgba(231, 76, 60, 0.1)';
        item.style.borderLeft = '4px solid #e74c3c';
      }
      
      updatePrice();
      
      item.style.transform = 'scale(1.02)';
      setTimeout(() => {
        item.style.transform = 'scale(1)';
      }, 150);
    }

    function updatePrice() {
      const basePrice = 200;
      let totalPrice = basePrice;
      
      const hummusCheckbox = document.getElementById('hummus');
      if (hummusCheckbox && hummusCheckbox.checked) {
        totalPrice += 30;
      }
      
      const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');
      const uncheckedCount = Array.from(allCheckboxes).filter(cb => !cb.checked).length;
      const discount = uncheckedCount * 8;
      
      totalPrice = Math.max(totalPrice - discount, 150);
      
      const priceElement = document.querySelector('.price');
      if (priceElement) {
        priceElement.textContent = `₹${totalPrice}`;
      }
    }

    function animateElements() {
      const cards = document.querySelectorAll('.card');
      cards.forEach((card, index) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(30px)';
        
        setTimeout(() => {
          card.style.transition = 'all 0.6s ease';
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
        }, index * 200);
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spicy Biryani - Customize Your Order | BiteRight</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="perfect-alignment.css" />
  <link rel="stylesheet" href="design-system.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
  
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      padding-bottom: 70px; /* Space for bottom nav */
      font-family: 'Poppins', sans-serif;
      color: #333;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      padding: 0.8rem;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      z-index: 1000;
    }
    
    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 1rem;
      padding-top: 4rem;
    }
    
    .dish-header {
      text-align: center;
      margin-bottom: 2rem;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .dish-header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    
    .dish-meta {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    
    .meta-badge {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-full);
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: 2rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all var(--transition-base);
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-xl);
    }
    
    .section-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .ingredients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }
    
    .ingredient-item {
      display: flex;
      align-items: center;
      padding: 0.8rem;
      background: rgba(102, 126, 234, 0.05);
      border-radius: var(--radius-lg);
      transition: all var(--transition-base);
      cursor: pointer;
    }
    
    .ingredient-item:hover {
      background: rgba(102, 126, 234, 0.1);
      transform: translateY(-2px);
    }
    
    .ingredient-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-right: 1rem;
      accent-color: #667eea;
      cursor: pointer;
    }
    
    .ingredient-item label {
      font-weight: 500;
      color: #2c3e50;
      cursor: pointer;
      flex: 1;
    }
    
    .price-info {
      text-align: center;
      margin: 1.5rem 0;
      padding: 1.5rem;
      background: rgba(39, 174, 96, 0.1);
      border-radius: var(--radius-lg);
    }
    
    .price-info .price {
      font-size: 1.5rem;
      font-weight: 700;
      color: #27ae60;
    }
    
    .price-info .price-note {
      font-size: 0.9rem;
      color: #7f8c8d;
      margin-top: 0.5rem;
    }
    
    .customize-btn {
      display: inline-block;
      width: 100%;
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
      color: white;
      border: none;
      border-radius: var(--radius-lg);
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all var(--transition-base);
      text-align: center;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      text-decoration: none;
    }
    
    .customize-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
        padding-top: 4rem;
      }
      
      .dish-header h1 {
        font-size: 1.5rem;
      }
      
      .ingredients-grid {
        grid-template-columns: 1fr;
      }
      
      .dish-meta {
        gap: 0.5rem;
      }
      
      .meta-badge {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
      }
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="window.history.back()">←</button>
  
  <div class="container">
    <div class="dish-header">
      <h1>🍛 Spicy Biryani</h1>
      <p>Aromatic basmati rice layered with tender meat and exotic spices</p>
      <div class="dish-meta">
        <span class="meta-badge">🌶️ Spicy Level: High</span>
        <span class="meta-badge">⏱️ Prep Time: 25-30 min</span>
        <span class="meta-badge">👥 Serves: 2-3</span>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">🥘 Main Ingredients</h2>
      <div class="ingredients-grid">
        <div class="ingredient-item">
          <input type="checkbox" id="rice" checked>
          <label for="rice">Premium Basmati Rice</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="protein" checked>
          <label for="protein">Chicken/Mutton/Vegetables</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="onions" checked>
          <label for="onions">Caramelized Onions</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="tomatoes" checked>
          <label for="tomatoes">Fresh Tomatoes</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="yogurt" checked>
          <label for="yogurt">Greek Yogurt</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="ginger-garlic" checked>
          <label for="ginger-garlic">Ginger-Garlic Paste</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="chilies" checked>
          <label for="chilies">Green Chilies</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="herbs" checked>
          <label for="herbs">Fresh Coriander & Mint</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="ghee" checked>
          <label for="ghee">Pure Ghee/Oil</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="lemon" checked>
          <label for="lemon">Fresh Lemon Juice</label>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">🌶️ Signature Spices</h2>
      <div class="ingredients-grid">
        <div class="ingredient-item">
          <input type="checkbox" id="red-chili" checked>
          <label for="red-chili">Kashmiri Red Chili</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="turmeric" checked>
          <label for="turmeric">Golden Turmeric</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="biryani-masala" checked>
          <label for="biryani-masala">Special Biryani Masala</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="whole-spices" checked>
          <label for="whole-spices">Whole Garam Masala</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="saffron">
          <label for="saffron">Premium Saffron (+₹50)</label>
        </div>
        <div class="ingredient-item">
          <input type="checkbox" id="star-anise">
          <label for="star-anise">Star Anise</label>
        </div>
      </div>
    </div>

    <div class="price-info">
      <div class="price">₹180</div>
      <div class="price-note">Price varies based on protein choice and add-ons</div>
    </div>

    <a href="Customize.html?dish=Spicy%20Biryani&price=180" class="customize-btn">🎯 Proceed to Customization</a>
  </div>

  <!-- Footer Navigation -->
  <nav class="bottom-nav">
    <div class="nav-container">
      <a href="index.html">
        <button class="nav-btn" data-page="home">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Home</span>
        </button>
      </a>
      <a href="my-orders.html" class="nav-link">
        <button class="nav-btn" data-page="orders">
          <span class="nav-icon">🍴</span>
          <span class="nav-label">Orders</span>
        </button>
      </a>
      <button class="nav-btn active" data-page="customize">
        <span class="nav-icon">🎯</span>
        <span class="nav-label">Customize</span>
      </button>
      <button class="nav-btn" data-page="offers">
        <span class="nav-icon">💸</span>
        <span class="nav-label">Offers</span>
      </button>
      <button class="nav-btn" data-page="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </button>
    </div>
  </nav>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      setupEventListeners();
      updatePrice();
    });

    function setupEventListeners() {
      // Add event listeners to all checkboxes
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      checkboxes.forEach(checkbox => {
        checkbox.addEventListener('change', handleIngredientChange);
      });

      // Add click listeners to ingredient items
      const ingredientItems = document.querySelectorAll('.ingredient-item');
      ingredientItems.forEach(item => {
        item.addEventListener('click', function(e) {
          if (e.target.type !== 'checkbox') {
            const checkbox = item.querySelector('input[type="checkbox"]');
            checkbox.checked = !checkbox.checked;
            handleIngredientChange.call(checkbox);
          }
        });
      });
    }

    function handleIngredientChange() {
      const item = this.closest('.ingredient-item');
      
      // Visual feedback
      if (this.checked) {
        item.style.background = 'rgba(102, 126, 234, 0.15)';
        item.style.borderLeft = '4px solid #667eea';
      } else {
        item.style.background = 'rgba(231, 76, 60, 0.1)';
        item.style.borderLeft = '4px solid #e74c3c';
      }
      
      // Update price
      updatePrice();
      
      // Add animation
      item.style.transform = 'scale(1.02)';
      setTimeout(() => {
        item.style.transform = 'scale(1)';
      }, 150);
    }

    function updatePrice() {
      const basePrice = 180;
      let totalPrice = basePrice;
      
      // Check for premium add-ons
      const saffronCheckbox = document.getElementById('saffron');
      if (saffronCheckbox && saffronCheckbox.checked) {
        totalPrice += 50;
      }
      
      // Count removed ingredients (discount)
      const allCheckboxes = document.querySelectorAll('input[type="checkbox"]');
      const uncheckedCount = Array.from(allCheckboxes).filter(cb => !cb.checked).length;
      const discount = uncheckedCount * 5; // ₹5 discount per removed ingredient
      
      totalPrice = Math.max(totalPrice - discount, 120); // Minimum price ₹120
      
      // Update price display
      const priceElement = document.querySelector('.price');
      if (priceElement) {
        priceElement.textContent = `₹${totalPrice}`;
      }
    }
  </script>
</body>
</html>
